services:
  cryptography-tool:
    build: .
    container_name: cryptography-tool
    ports:
      - "8000:8000"      # localhost:8000 → container:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 8s
